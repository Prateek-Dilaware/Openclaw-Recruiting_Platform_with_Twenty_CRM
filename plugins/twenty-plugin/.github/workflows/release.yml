name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24 (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm CLI to >=11.5.1 (required for Trusted Publishing)
        run: npm install -g npm@latest

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version from tag into package files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i 's/"version": *"[^"]*"/"version": "'"$VERSION"'"/' package.json openclaw.plugin.json

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release_notes.md
          if [ -s release_notes.md ]; then
            echo "FOUND=true" >> "$GITHUB_OUTPUT"
          else
            echo "FOUND=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile TypeScript
        run: npm run build

      - name: Publish to npm (Trusted Publishing via OIDC)
        # No NODE_AUTH_TOKEN needed — npm CLI requests an OIDC token from
        # GitHub and exchanges it with npm. Provenance statement is attached
        # automatically when Trusted Publishing is configured for the package.
        run: npm publish --access public

      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false

      - name: Create GitHub Release (auto-generated notes)
        if: steps.changelog.outputs.FOUND == 'false'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
